<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE-PROG core</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d11; /* Просто глубокий темный фон */
            color: #cbd5e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .compact-box {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .avatar {
            width: 120px; /* Сделали логотип покомпактнее */
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #2563eb; /* Тонкая, неброская рамка */
            margin-bottom: 20px;
        }

        /* Большое, строгое название, как ты просил */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 12px;
        }

        /* Текст ровно в две строчки: просто и понятно */
        .text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #64748b; /* Спокойный серый цвет */
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="compact-box">
        <img src="myofficialpng.png" alt="Logo" class="avatar">
        
        <h1>ONE-PROG core</h1>
        
        <!-- Ровно две строчки спокойного, скромного текста -->
        <p class="text">
            Personal space for development and system logic experiments.<br>
            Building independent cross-platform CLI utilities using C# / .NET.
        </p>
    </div>

</body>
</html>

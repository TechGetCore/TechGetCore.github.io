<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICRO-THEARD | Official</title>
    <style>
        /* ВСЕ ТВОИ СТИЛИ ТЕПЕРЬ ТУТ */
        body {
            background-color: #000; /* Глубокий черный фон */
            color: #ff0000;         /* Твой фирменный красный */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Настройка твоего логотипа logo.png */
        .main-logo {
            width: 320px;
            height: auto;
            /* Эффект красного неона вокруг логотипа */
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.7));
            transition: 0.5s ease;
            cursor: pointer;
        }

        /* Логотип будет плавно увеличиваться при наведении */
        .main-logo:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 45px rgba(255, 0, 0, 1));
        }

        h1 {
            font-size: 4em;
            letter-spacing: 12px; /* Широкие буквы для стиля */
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .tagline {
            color: #444; /* Темно-серый для контраста */
            font-size: 1.1em;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Небольшая анимация "биения сердца" для текста */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .loading {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <!-- ТВОЙ ЛОГОТИП (Файл logo.png должен лежать рядом в GitHub) -->
    <img src="logo.png" alt="Build Darts Logo" class="main-logo">

    <h1>MICRO-THEARD</h1>
    <p class="tagline OFFICIAL SITE-100</p>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToOne-X | Official</title>
    <style>
        /* Обнуляем отступы и задаем глубокий черный фон */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0f; /* Настоящий хардкорный темный фон */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Контейнер для карточки твоего профиля */
        .profile-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
        }

        /* Твой сочный круглый логотип */
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1e40af; /* Синяя линия в цвет твоего логотипа */
            box-shadow: 0 0 30px rgba(30, 64, 175, 0.4); /* Неоновое свечение */
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        /* Эффект при наведении на аватарку */
        .avatar:hover {
            transform: scale(1.05);
        }

        /* Главный заголовок твоего бренда */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6); /* Сине-фиолетовый градиент */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 1rem;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Блок со списком твоих технологий */
        .tech-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        .tag.csharp { border-color: #8b5cf6; color: #a78bfa; }
        .tag.rust { border-color: #f97316; color: #fdba74; }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Подключаем твою картинку. Имя файла должно в точности совпадать! -->
        <img src="logo.png.PNG" alt="ONE-PROG Logo" class="avatar">
        
        <h1>ONE-PROG</h1>
        <div class="subtitle">ToOne-X | Official Space</div>
        
        <div class="tech-tags">
            <div class="tag csharp">C# / .NET</div>
            <div class="tag rust">Rust</div>
            <div class="tag">CLI & CLI Utils</div>
            <div class="tag">5D Geometry</div>
        </div>
    </div>

</body>
</html>
